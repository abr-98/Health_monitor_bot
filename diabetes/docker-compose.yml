version: "3.9"

services:

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    volumes:
      - /Users/abhijit/Desktop/Stock_Project/mlFlow_and_mcp/diabetes/mlruns:/app/mlruns
      - /Users/abhijit/Desktop/Stock_Project/mlFlow_and_mcp/diabetes/mlflow.db:/app/mlflow.db
    command: >
        mlflow server
          --backend-store-uri sqlite:///mlflow.db
          --default-artifact-root /app/mlruns
          --host 0.0.0.0
          --port 5000
          --allowed-hosts "*"
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fastapi_app
    depends_on:
      mlflow:
        condition: service_healthy

    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8001:8001"

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp_server
    depends_on:
      mlflow:
        condition: service_healthy

    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"